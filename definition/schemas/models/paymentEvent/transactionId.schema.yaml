$schema: https://json-schema.org/draft/2020-12/schema
title: transactionId
description: 'Identifier of the financial transaction associated with the payment. In case of FC or DC_CC : This is the Payment Transaction ID generated by the Payment Module upon request from the Portal or the Tablet assigned to the payment transaction, upon request from the Portal or the Tablet UI when the Tax Payer pays for a sanction with Fuel, Debit or Credit card. Bank Transfer or Refund, this is the CAMT file transaction identifier of that camt file entry.'
type: string
minLength: 1
examples:
  - S1000000000000000000000000000641
