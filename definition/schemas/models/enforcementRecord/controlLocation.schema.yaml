  kilometerPoint:
    $ref: ../../common/kilometerPoint.schema.yaml
  postalCode:
    $ref: ../../common/postalCode.schema.yaml
  gpsCoordinates:
    $ref: ../../common/gpsCoordinates.schema.yaml
  sectionIdExt:
    $ref: ../../common/sectionIdExt.schema.yaml
  sectionName:
    $ref: ../../common/sectionName.schema.yaml
  device:
    $ref: ../../common/device.schema.yaml
  locality:
    $ref: ../../common/locality.schema.yaml
