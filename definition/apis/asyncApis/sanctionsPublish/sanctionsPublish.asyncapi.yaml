asyncapi: 3.1.0
info:
  title: Publish sanctions
  version: X.Y.Z
  description: Kafka topic for publishing sanctions to Reporting Module

servers:
  production:
    host: localhost:9092
    protocol: kafka
    description: Production Kafka

channels:
  sanctions:
    address: kafka-topic/sanctions
    messages:
      sanction:
        name: sanction
        title: Sanction envelope
        summary: Carries the full sanction envelope with meta and payload.
        contentType: application/json
        payload:
          $ref: ../../../../published-current/schemas/sanction/sanction.schema.yaml

operations:
  publishEnforcementRecord:
    action: send
    channel:
      $ref: '#/channels/sanctions'
    messages:
      - $ref: '#/channels/sanctions/messages/sanction'