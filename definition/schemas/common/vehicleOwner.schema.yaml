$schema: https://json-schema.org/draft/2020-12/schema
title: vehicleOwner
description: Selected vehicle owner who should pay for the sanction.
type: object
additionalProperties: false
required:
- type
- details
- contact
- address
properties:
  type:
    $ref: ./vehicleOwnerType.schema.yaml
  details:
    $ref: ./details.schema.yaml
  contact:
    $ref: ./contact.schema.yaml
  address:
    $ref: ./address.schema.yaml
allOf:
- if:
    properties:
      type:
        const: PERSON
    required:
    - type
  then:
    properties:
      details:
        $ref: ./detailsPerson.schema.yaml
- if:
    properties:
      type:
        const: COMPANY
    required:
    - type
  then:
    properties:
      details:
        $ref: ./detailsCompany.schema.yaml
