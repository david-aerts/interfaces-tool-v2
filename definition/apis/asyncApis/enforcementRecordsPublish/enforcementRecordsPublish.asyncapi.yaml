asyncapi: 3.1.0
info:
  title: Publish enforcement records
  version: X.Y.Z
  description: Kafka topic for publishing enforcement records to Reporting Module

servers:
  production:
    host: localhost:9092
    protocol: kafka
    description: Production Kafka

channels:
  enforcementRecords:
    address: kafka-topic/enforcementRecords
    messages:
      enforcementRecord:
        name: enforcementRecord
        title: Enforcement record envelope
        summary: Carries the full enforcement record envelope with meta and payload.
        contentType: application/json
        payload:
          $ref: ../../../../publication/schemas/enforcementRecord/enforcementRecord.schema.yaml

operations:
  publishEnforcementRecord:
    action: send
    channel:
      $ref: '#/channels/enforcementRecords'
    messages:
      - $ref: '#/channels/enforcementRecords/messages/enforcementRecord'