asyncapi: 3.1.0
info:
  title: Publish payment event
  version: X.Y.Z
  description: Kafka topic for publishing payment events to Sanctioning Module

servers:
  production:
    host: localhost:9092
    protocol: kafka
    description: Production Kafka

channels:
  paymentEvents:
    address: kafka-topic/payment-event
    messages:
      paymentEvent:
        name: paymentEvent
        title: PaymentEvent envelope
        summary: Carries the full paymentEvent envelope with meta and payload.
        contentType: application/json
        payload:
          $ref: ../../../../published-current/schemas/paymentEvent/paymentEvent.schema.yaml

operations:
  publishPaymentEvent:
    action: send
    channel:
      $ref: '#/channels/paymentEvents'
    messages:
      - $ref: '#/channels/paymentEvents/messages/paymentEvent'