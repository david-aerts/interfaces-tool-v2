$schema: https://json-schema.org/draft/2020-12/schema
$id: common-location
title: location
description: Location
type: object
additionalProperties: false
required:
- latitude
- longitude
- country
- city
- countryCode
- postalCode
- county
- houseNumber
- street
- district
- name
- state
properties:
