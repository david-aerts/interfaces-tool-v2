    $ref: ./latitude.schema.yaml
  longitude:
    $ref: ./longitude.schema.yaml
  country:
    $ref: ./country.schema.yaml
  city:
    $ref: ./city.schema.yaml
  countryCode:
    $ref: ./countryCode.schema.yaml
  postalCode:
    $ref: ./postalCode.schema.yaml
  county:
    $ref: ./county.schema.yaml
  houseNumber:
    $ref: ./houseNumber.schema.yaml
  street:
    $ref: ./street.schema.yaml
  district:
    $ref: ./district.schema.yaml
  name:
    $ref: ./locationName.schema.yaml
  state:
    $ref: ./state.schema.yaml
